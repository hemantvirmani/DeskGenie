name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build & publish Windows exe
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (frontend + PyInstaller)
        run: python desktop/build.py

      - name: Smoke test
        run: |
          $proc = Start-Process -FilePath "dist\DeskGenie\DeskGenie.exe" -ArgumentList '--smoke-test' -PassThru -Wait -WindowStyle Hidden
          if ($proc.ExitCode -ne 0) {
            Write-Error "Smoke test failed with exit code $($proc.ExitCode)"
            exit 1
          }
        shell: pwsh

      - name: Zip release artifact
        run: Compress-Archive -Path dist\DeskGenie\* -DestinationPath DeskGenie-${{ github.ref_name }}-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: DeskGenie-${{ github.ref_name }}-windows.zip
